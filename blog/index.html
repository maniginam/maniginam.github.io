---
layout: default
title: Blog
description: Thoughts on software craft, career growth, and engineering by Gina Martiny.
---
<section class="blog-3d-section">
    <h1 class="section-title reveal">Blog</h1>
    <p class="section-subtitle reveal">Scroll or drag to browse. Click a card to read.</p>
    <div id="blog-3d-scene"></div>

    <!-- Accessible fallback (shown for reduced-motion or no JS) -->
    <div id="blog-fallback" class="post-list">
        {% for post in site.tags.blog %}
        <a href="{{ post.url }}" class="post-list-card reveal" title="{{ post.title }}">
            <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
            <span class="post-title">{{ post.title }}</span>
        </a>
        {% endfor %}
    </div>
</section>

<script>
// Inject post data for Three.js
window.BLOG_POSTS = [
  {% for post in site.tags.blog %}
  {
    title: {{ post.title | jsonify }},
    date: {{ post.date | date: "%b %d, %Y" | jsonify }},
    url: {{ post.url | jsonify }},
    excerpt: {{ post.content | strip_html | truncatewords: 20 | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/blog-cards-3d.js"></script>
