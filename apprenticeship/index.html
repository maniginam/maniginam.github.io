---
layout: default
title: Apprenticeship
---
<section class="page-section">
    <h1 class="section-title reveal">Apprenticeship</h1>
    <p class="section-subtitle reveal">Notes from learning the craft of software development</p>
    <div class="post-list">
        {% for post in site.tags.apprenticeship %}
        {% if post.hide != true %}
        <a href="{{ post.url }}" class="post-list-card reveal" title="{{ post.title }}">
            <span class="post-date">{{ post.date | date: "%b %d, %Y" }}</span>
            <span class="post-title">{{ post.title }}</span>
        </a>
        {% endif %}
        {% endfor %}
    </div>
</section>
